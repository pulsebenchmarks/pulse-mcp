name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check mcp.js
        run: node --check functions/mcp.js
      - name: Smoke test live endpoint
        run: |
          set -euo pipefail
          body=$(curl -fsS https://pulsebenchmarks.com/mcp)
          echo "$body" | head -c 400
          name=$(printf '%s' "$body" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{console.log(JSON.parse(s).name)})")
          test "$name" = "pulse"
